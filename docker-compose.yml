services:
  db:
    image: pgvector/pgvector:pg16
    container_name: alfagent-db
    environment:
      POSTGRES_DB: alfagent
      POSTGRES_USER: alfagent
      POSTGRES_PASSWORD: alfagent
    ports:
      - "5432:5432"
    volumes:
      - alfagent_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alfagent -d alfagent"]
      interval: 5s
      timeout: 5s
      retries: 10
    command:
      - postgres
      - -c
      - max_connections=200
      - -c
      - shared_buffers=256MB
      - -c
      - effective_cache_size=768MB
      - -c
      - work_mem=16MB

volumes:
  alfagent_pgdata:
